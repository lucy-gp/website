<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="Home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">YourBrand</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav-link" href="about.html">About us</a>
        <a class="nav-link" href="partners.html">Partners</a>
        <a class="nav-link nav-cta" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="hero">
      <div class="container">
        <div class="reel-wrap" aria-label="Artist reel">
          <div class="reel" id="reel" role="list">
            <!-- Replace the image URLs below with your own -->
            <img
              class="reel-item is-active"
              src="https://www.instagram.com/p/DaFmb0SOJvv/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
              alt="Artist 1"
              loading="eager"
            />
            <img
              class="reel-item"
              src="https://images.unsplash.com/photo-1515168833906-cf1c7c4d1b3b?auto=format&fit=crop&w=1600&q=80"
              alt="Artist 2"
              loading="lazy"
            />
            <img
              class="reel-item"
              src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80"
              alt="Artist 3"
              loading="lazy"
            />
            <img
              class="reel-item"
              src="https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=crop&w=1600&q=80"
              alt="Artist 4"
              loading="lazy"
            />
          </div>

          <div class="reel-ui" aria-hidden="true">
            <div class="dots" id="dots">
              <!-- populated by JS -->
            </div>
          </div>

          <button class="reel-btn prev" type="button" id="prev" aria-label="Previous artist">‹</button>
          <button class="reel-btn next" type="button" id="next" aria-label="Next artist">›</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="brand-footer">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">YourBrand</span>
      </div>
      <p class="footer-text">© <span id="year"></span> YourBrand. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const items = Array.from(document.querySelectorAll(".reel-item"));
    const dotsEl = document.getElementById("dots");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");

    let index = 0;
    const intervalMs = 3500;
    let timer;

    function renderDots() {
      items.forEach((_, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "dot" + (i === index ? " is-active" : "");
        b.setAttribute("aria-label", `Go to artist ${i + 1}`);
        b.addEventListener("click", () => goTo(i, true));
        dotsEl.appendChild(b);
      });
    }

    function setActive(newIndex) {
      items.forEach((img, i) => img.classList.toggle("is-active", i === newIndex));
      const dots = Array.from(dotsEl.querySelectorAll(".dot"));
      dots.forEach((d, i) => d.classList.toggle("is-active", i === newIndex));
      index = newIndex;
    }

    function goTo(newIndex, restart) {
      const total = items.length;
      const wrapped = (newIndex + total) % total;
      setActive(wrapped);
      if (restart) restartTimer();
    }

    function restartTimer() {
      clearInterval(timer);
      timer = setInterval(() => goTo(index + 1), intervalMs);
    }

    prevBtn.addEventListener("click", () => goTo(index - 1, true));
    nextBtn.addEventListener("click", () => goTo(index + 1, true));

    // Pause on hover/focus for nicer UX
    const reelWrap = document.querySelector(".reel-wrap");
    reelWrap.addEventListener("mouseenter", () => clearInterval(timer));
    reelWrap.addEventListener("mouseleave", () => restartTimer());
    reelWrap.addEventListener("focusin", () => clearInterval(timer));
    reelWrap.addEventListener("focusout", () => restartTimer());

    renderDots();
    timer = setInterval(() => goTo(index + 1), intervalMs);

    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
